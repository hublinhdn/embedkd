# D3: scale test on Stanford Online Products (~11k train classes, 120k images).
# Teacher: same file plus
#   --set run.tag=d3_teacher --set student.backbone=resnet50 --set distill.alpha=0
# Note: sce/arcface heads at this class count are large; the recipe uses
# triplet only, which is standard practice on SOP.
run:
  tag: d3_cosine

backbone_policy: supported
teacher: {backbone: resnet50, weights: runs/d3_teacher/best.pth, embed_dim: 512}
student: {backbone: resnet18, pretrained: true, embed_dim: 512}

head:
  pooling: gem
  normalize: true
  losses: {triplet: 1.0}
  triplet: {margin: 0.3, mining: batch_hard}

distill:
  objective: cosine
  alpha: 10.0

data:
  adapter: sop
  root: data
  input_size: 224
  sampler: pk
  p_classes: 16
  k_samples: 4
  num_workers: 8

train:
  epochs: 30
  optimizer: adamw
  lr: 3.0e-4
  lr_backbone: 3.0e-5
  weight_decay: 5.0e-2
  scheduler: cosine
  warmup_epochs: 5
  amp: true
  seed: 42
  eval_every: 5

eval: {batch_size: 256, report_retention: true}
