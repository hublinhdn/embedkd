name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install CPU torch and package
        run: |
          # torch and torchvision must come from the SAME index: timm pulls in
          # torchvision, and a PyPI torchvision on top of a CPU-index torch
          # fails at import with "operator torchvision::nms does not exist".
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check embedkd tests
      - name: Tests
        run: pytest -q
